        flex: 1;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        padding: 32px;
      }
      .teacher-content h2 {
        margin-bottom: 24px;
        font-size: 28px;
        font-weight: 800;
      }
      .student-selector {
        margin-bottom: 32px;
      }
      .student-selector select,
      .editor-section select {
        border: 2px solid var(--border);
        background: var(--surface);
        cursor: pointer;
        border-radius: 8px;
        width: 100%;
        padding: 12px 16px;
        font-size: 15px;
        transition: all 0.2s;
      }
      .student-selector select:focus,
      .editor-section select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-light);
        outline: none;
      }
      .editor-section {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        margin-bottom: 32px;
        padding: 24px;
        transition: all 0.3s;
      }
      .editor-section:hover {
        box-shadow: 0 8px 40px #0000001a;
      }
      .editor-section h3 {
        align-items: center;
        gap: 8px;
        margin-bottom: 20px;
        font-size: 18px;
        font-weight: 700;
        display: flex;
      }
      .editable-list {
        margin-bottom: 16px;
      }
      .editable-list-item {
        background: var(--bg);
        border-radius: 8px;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
        padding: 10px 14px;
        font-size: 14px;
        transition: all 0.2s;
        display: flex;
      }
      .editable-list-item:hover {
        background: var(--primary-light);
      }
      .editable-list-item .item-text {
        flex: 1;
      }
      .editable-list-item .btn-remove {
        color: var(--danger);
        cursor: pointer;
        background: 0 0;
        border: none;
        border-radius: 4px;
        padding: 4px;
        font-size: 18px;
        transition: all 0.2s;
      }
      .editable-list-item .btn-remove:hover {
        background: #fef2f2;
        transform: scale(1.1);
      }
      .add-row {
        gap: 8px;
        display: flex;
      }
      .add-row input,
      .add-row textarea {
        border: 2px solid var(--border);
        border-radius: 8px;
        flex: 1;
        padding: 10px 14px;
        font-family: inherit;
        font-size: 14px;
        transition: all 0.2s;
      }
      .add-row input:focus,
      .add-row textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-light);
        outline: none;
      }
      .project-add-form {
        flex-direction: column;
        gap: 8px;
        display: flex;
      }
      .project-add-form .add-row-btns {
        justify-content: flex-end;
        display: flex;
      }
      .save-bar {
        background: var(--surface);
        border-top: 1px solid var(--border);
        justify-content: flex-end;
        gap: 12px;
        padding: 16px 32px;
        display: flex;
        position: sticky;
        bottom: 0;
        box-shadow: 0 -4px 16px #0000000f;
      }
      .group-tabs {
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
        display: flex;
      }
      .group-tab-btn {
        border: 2px solid var(--border);
        background: var(--bg);
        color: var(--text-secondary);
        cursor: pointer;
        border-radius: 20px;
        padding: 8px 18px;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.25s;
      }
      .group-tab-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px #4f46e526;
      }
      .group-tab-btn.active {
        background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
        border-color: var(--primary);
        color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px #4f46e559;
      }
      .group-stats {
        background: var(--bg);
        border-left: 4px solid var(--primary);
        border-radius: 8px;
        flex-wrap: wrap;
        gap: 16px;
        padding: 10px 16px;
        display: flex;
      }
      .group-stat {
        color: var(--text-secondary);
        font-size: 14px;
      }
      .group-stat strong {
        color: var(--primary);
      }
      .tab-switcher {
        background: var(--bg);
        border-radius: 12px;
        gap: 4px;
        margin-bottom: 28px;
        padding: 5px;
        display: flex;
      }
      .tab-btn {
        cursor: pointer;
        color: var(--text-secondary);
        background: 0 0;
        border: none;
        border-radius: 9px;
        flex: 1;
        padding: 11px 16px;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.25s;
      }
      .tab-btn:hover {
        color: var(--primary);
        background: #4f46e50f;
      }
      .tab-btn.active {
        background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
        color: #fff;
        box-shadow: 0 4px 15px #4f46e54d;
      }
      .print-actions-bar {
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 20px;
        display: flex;
      }
      .print-portfolio {
        animation: 0.3s ease-out fadeIn;
      }
      @media print {
        .header,
        .print-section,
        .save-bar,
        .tab-switcher,
        .group-tabs,
        .group-stats,
        .print-actions-bar,
        .student-selector,
        .editor-section:not(.print-portfolio),
        .btn {
          display: none !important;
        }
        .teacher-content {
          padding: 0 !important;
        }
        .print-portfolio {
          box-shadow: none !important;
          border: 1px solid #ddd !important;
          display: block !important;
        }
        body {
          background: #fff !important;
        }
        .card {
          box-shadow: none;
          border: 1px solid #ddd;
        }
        .bg-sphere,
        .floating-shapes,
        .particles {
          display: none !important;
        }
        .achievement-item:before {
          content: "🏆";
        }
      }
      .toast {
        background: linear-gradient(135deg, var(--success) 0%, #34d399 100%);
        color: #fff;
        opacity: 0;
        z-index: 1000;
        border-radius: 12px;
        padding: 14px 24px;
        font-weight: 600;
        transition: all 0.3s;
        position: fixed;
        bottom: 24px;
        right: 24px;
        transform: translateY(100px);
        box-shadow: 0 8px 30px #10b98166;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      @media print {
        .header,
        .print-section,
        .btn {
          display: none !important;
        }
        .student-content {
          padding: 0;
        }
        body {
          background: #fff;
        }
        .card {
          box-shadow: none;
          border: 1px solid #ddd;
        }
        .bg-sphere,
        .floating-shapes,
        .particles {
          display: none !important;
        }
      }
      @media (max-width: 640px) {
        .header {
          padding: 12px 16px;
        }
        .header .logo {
          font-size: 17px;
        }
        .student-content,
        .teacher-content {
          padding: 16px;
        }
        .card {
          padding: 20px;
        }
        .login-card {
          padding: 24px;
        }
        .portfolio-header {
          text-align: center;
          flex-direction: column;
        }
        .portfolio-header-info h2 {
          font-size: 22px;
        }
        .home-content h1 {
          font-size: 28px;
        }
        .home-buttons .btn {
          justify-content: center;
          width: 100%;
        }
        .contact-grid {
          grid-template-columns: 1fr;
        }
        .editor-section {
          padding: 16px;
        }
        .save-bar {
          padding: 12px 16px;
        }
        .add-row {
          flex-direction: column;
        }
        .user-badge {
          display: none;
        }
        .bg-sphere {
          width: 150px !important;
          height: 150px !important;
        }
      }
